<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendez-vous</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid #334155;
        }

        .time-box {
            background: #334155;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 25px;
        }

        .location-title {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .gps-coords {
            font-family: monospace;
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            color: #f43f5e;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px dashed #f43f5e;
            user-select: all;
        }

        .map-container {
            margin-top: 15px;
            border-radius: 12px;
            overflow: hidden;
            height: 250px;
            border: 1px solid #334155;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .btn-maps {
            display: inline-block;
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            text-decoration: none;
            border-radius: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="time-box">
            🕒 Rendez-vous à 20h30
        </div>

        <div class="location-title">📍 Point GPS du lieu :</div>
        
        <div class="gps-coords">
            45.8992, 6.1294
        </div>

        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2776.883730303666!2d6.126825076891008!3d45.89923830467778!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x478b8a4f10793b5d%3A0xd6391fb1ff77f88e!2sAnnecy!5e0!3m2!1sfr!2sfr!4v1700000000000!5m2!1sfr!2sfr" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>

        <a href="https://maps.google.com/?q=45.8992,6.1294" target="_blank" class="btn-maps">
            Ouvrir dans Google Maps
        </a>
    </div>

</body>
</html>
